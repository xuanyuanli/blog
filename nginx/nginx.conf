worker_processes  auto;

error_log  logs/error_log;

pid        logs/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access_log  main;

    sendfile        on;

    keepalive_timeout  65;

    gzip  on;
    # 启用gzip压缩的最小文件，小于设置值的文件将不会压缩
    gzip_min_length 1k;

    # gzip 压缩级别，1-9，数字越大压缩的越好，也越占用CPU时间
    gzip_comp_level 6;

    # 进行压缩的文件类型。javascript有多种形式。其中的值可以在 mime.types 文件中找到。
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png application/vnd.ms-fontobject font/ttf font/opentype font/x-woff image/svg+xml;

    # 是否在http header中添加Vary: Accept-Encoding，建议开启
    gzip_vary on;

    # 禁用IE 6 gzip
    gzip_disable "MSIE [1-6]\.";

    # 设置压缩所需要的缓冲区大小
    gzip_buffers 32 4k;

    server {
        listen 80;
        server_name xuanyuanli.cn www.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name xuanyuanli.cn www.xuanyuanli.cn;

        location /MP_verify_wK3SRD5S58tT0Lyn.txt {
            root html;
        }
        #旧博客归档静态资源兼容（搜索引擎/外链仍可能访问旧 URL）
        location ~ ^/(assets|asset|img)/ {
            root /var/www/blog/archive;
            access_log off;
            add_header Cache-Control "public, max-age=15552000";
        }
        # 旧博客归档
        location /archive/ {
            alias /var/www/blog/archive/;
            try_files $uri $uri/ /archive/index.html;
        }
        location / {
            root /var/www/blog;
            try_files $uri $uri/ /index.html;
        }

        location /wechat/ {
            # 防止预检的时候出现跨域
            if ( $request_method = 'OPTIONS' ) {
                add_header Access-Control-Allow-Methods '*';
                add_header Access-Control-Max-Age 3600;
                add_header Access-Control-Allow-Credentials 'true';
                add_header Access-Control-Allow-Origin '$http_origin';
                add_header 'Access-Control-Allow-Headers' '$http_access_control_request_headers';
                return 204;
            }

            proxy_pass http://127.0.0.1:8080/wechat/; #负载均衡配置 和upstream 后边的路径配置一致
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Methods '*';
            add_header Access-Control-Max-Age 3600;
            add_header Access-Control-Allow-Credentials 'true';
            add_header Access-Control-Allow-Origin '$http_origin';
            add_header 'Access-Control-Allow-Headers' '$http_access_control_request_headers';
        }

    }

    server {
        listen 80;
        server_name dify.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  dify.xuanyuanli.cn;

	client_max_body_size 100M;
	proxy_connect_timeout 120s;  # 连接后端服务的超时时间
	proxy_read_timeout 300s;    # 读取后端服务响应的超时时间
	proxy_send_timeout 300s;    # 发送请求到后端服务的超时时间

        location / {
            proxy_pass http://127.0.0.1:880; #负载均衡配置 和upstream 后边的路径配置一致
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 80;
        server_name cert.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  cert.xuanyuanli.cn;

        location / {
            proxy_pass http://127.0.0.1:7001; #负载均衡配置 和upstream 后边的路径配置一致
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 80;
        server_name ai.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  ai.xuanyuanli.cn;

        location / {
            proxy_pass http://127.0.0.1:3000; #负载均衡配置 和upstream 后边的路径配置一致
            proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
	    proxy_buffering off;
        }
    }

    server {
        listen 80;
        server_name license.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  license.xuanyuanli.cn;

    	# 静态文件根目录
    	root /var/www/license_server_webui;
    	index index.html;

    	# Gzip 压缩
	gzip on;
    	gzip_vary on;
    	gzip_min_length 1024;
    	gzip_comp_level 6;
    	gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    	# SPA 路由支持
    	location / {
        	try_files $uri $uri/ /index.html;

        	# HTML 不缓存
        	add_header Cache-Control "no-store, no-cache, must-revalidate";
    		# HSTS (强制 HTTPS)
    		add_header Strict-Transport-Security "max-age=63072000" always;

    		# 安全头
    		add_header X-Frame-Options "SAMEORIGIN" always;
    		add_header X-Content-Type-Options "nosniff" always;
    		add_header X-XSS-Protection "1; mode=block" always;
    		add_header Referrer-Policy "no-referrer-when-downgrade" always;
    	}

    	# 静态资源缓存(1年)
    	location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        	expires 1y;
        	add_header Cache-Control "public, immutable";
        	access_log off;
    	}

    	# API 代理
    	location /api {
        	proxy_pass http://localhost:8000;
        	proxy_set_header Host $host;
        	proxy_set_header X-Real-IP $remote_addr;
        	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        	proxy_set_header X-Forwarded-Proto $scheme;

        	# WebSocket 支持
        	proxy_http_version 1.1;
        	proxy_set_header Upgrade $http_upgrade;
        	proxy_set_header Connection "upgrade";
    	}
    }

    server {
        listen 80;
        server_name stock.xuanyuanli.cn;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_certificate cert/xuanyuanli.cn.pem;
        ssl_certificate_key cert/xuanyuanli.cn.key;
        ssl_session_timeout 5h;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  stock.xuanyuanli.cn;

        location / {
            proxy_pass http://127.0.0.1:3001; #负载均衡配置 和upstream 后边的路径配置一致
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }
}
